name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # cpal (sensorium-voice's `feature = "audio"`) links against
      # ALSA on Linux; Ubuntu runners don't ship the dev headers.
      - name: Install ALSA dev headers (Linux)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo clippy (-D warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      # cpal (sensorium-voice's `feature = "audio"`) links against
      # ALSA on Linux; macOS uses CoreAudio and needs nothing extra.
      - name: Install ALSA dev headers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Cache
        uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-features
      - name: cargo test --doc (compile_fail doctests)
        run: cargo test --workspace --doc

  # MSRV check disabled until we ship a Cargo.lock to crates.io. Transitive
  # deps (e.g. wasip2 via getrandom) currently resolve to versions that
  # require Rust 1.87+, even though our crate code is 1.85-compatible.
  # Re-enable with `--locked` and a checked-in Cargo.lock once published.
